apiVersion: apps/v1
kind: Deployment
metadata:
  name: adqip-worker
  namespace: adqip
  labels:
    app: adqip-worker
spec:
  replicas: 2
  selector:
    matchLabels:
      app: adqip-worker
  template:
    metadata:
      labels:
        app: adqip-worker
    spec:
      containers:
        - name: worker
          image: adqip/ml-pipeline:latest
          envFrom:
            - configMapRef:
                name: adqip-config
            - secretRef:
                name: adqip-secrets
          resources:
            requests:
              cpu: "500m"
              memory: "2Gi"
            limits:
              cpu: "4000m"
              memory: "8Gi"
